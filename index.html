 <!DOCTYPE html>
  <html>
  <head>
    <title>XIAO Bubble Level</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: #1a1a2e;
        color: white;
        padding: 20px;
        margin: 0;
      }
      h1 { margin-bottom: 10px; }
      .buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: center;
      }
      button {
        padding: 14px 28px;
        font-size: 16px;
        background: #0f3460;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin: 5px;
      }
      button:hover { background: #16213e; }
      button:disabled { background: #1a3a2a; color: #4a8a6a; cursor: default; border: 1px dashed #4a8a6a; }
      #calibrateBtn { background: #2d6a4f; }
      #calibrateBtn:hover { background: #1b4332; }
      #status  { color: #aaa; font-size: 14px; margin: 8px; text-align: center; }
      #angles  { font-size: 20px; margin: 10px; letter-spacing: 1px; }
      #calInfo { font-size: 12px; color: #666; margin-top: 4px; text-align: center; }
    </style>
  </head>
  <body>
    <h1>Bubble Level</h1>
    <div class="buttons">
      <button id="connectBtn" onclick="connect()">Connect to XIAO-Level</button>
      <button id="calibrateBtn" onclick="calibrate()" disabled>Calibrate (Set Level)</button>
    </div>
    <div id="status">Not connected</div>
    <canvas id="level" width="320" height="320"></canvas>
    <div id="angles">Pitch: --&nbsp;&nbsp;&nbsp;Roll: --</div>
    <div id="calInfo">No calibration stored</div>

    <script>
      const SERVICE_UUID = 'a4a8d462-495b-4d5e-9a62-d8b5c6e4f301';
      const CHAR_UUID    = 'a4a8d463-495b-4d5e-9a62-d8b5c6e4f301';
      const CAL_KEY      = 'xiao_level_calibration';

      let pitch = 0, roll = 0;
      let pitchOffset = 0, rollOffset = 0;

      function loadCalibration() {
        const stored = localStorage.getItem(CAL_KEY);
        if (stored) {
          const cal = JSON.parse(stored);
          pitchOffset = cal.pitchOffset;
          rollOffset  = cal.rollOffset;
          const date  = new Date(cal.timestamp).toLocaleString();
          document.getElementById('calInfo').textContent =
            `Calibrated: ${date}  (Pitch offset: ${pitchOffset.toFixed(1)}°  Roll offset: ${rollOffset.toFixed(1)}°)`;
        } else {
          document.getElementById('calInfo').textContent = 'No calibration stored';
        }
      }

      function calibrate() {
        pitchOffset = pitch + pitchOffset;
        rollOffset  = roll  + rollOffset;
        const cal = { pitchOffset, rollOffset, timestamp: Date.now() };
        localStorage.setItem(CAL_KEY, JSON.stringify(cal));
        const date = new Date(cal.timestamp).toLocaleString();
        document.getElementById('calInfo').textContent =
          `Calibrated: ${date}  (Pitch offset: ${pitchOffset.toFixed(1)}°  Roll offset: ${rollOffset.toFixed(1)}°)`;
        document.getElementById('status').textContent = 'Calibrated — bubble centred to current surface';
      }

      async function connect() {
        try {
          document.getElementById('status').textContent = 'Scanning...';
          document.getElementById('connectBtn').disabled = true;
          const device = await navigator.bluetooth.requestDevice({
            filters: [{ services: [SERVICE_UUID] }]
          });
          const server = await device.gatt.connect();
          const service = await server.getPrimaryService(SERVICE_UUID);
          const char = await service.getCharacteristic(CHAR_UUID);
          await char.startNotifications();
          char.addEventListener('characteristicvaluechanged', onData);
          document.getElementById('status').textContent = 'Connected to ' + device.name;
          document.getElementById('connectBtn').textContent = 'Connected';
          document.getElementById('calibrateBtn').disabled = false;
          device.addEventListener('gattserverdisconnected', onDisconnect);
        } catch (e) {
          document.getElementById('status').textContent = 'Error: ' + e.message;
          document.getElementById('connectBtn').disabled = false;
        }
      }

      function onDisconnect() {
        document.getElementById('status').textContent = 'Disconnected — tap Connect to reconnect';
        document.getElementById('connectBtn').textContent = 'Connect to XIAO-Level';
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('calibrateBtn').disabled = true;
        pitch = 0; roll = 0;
        draw();
      }

      function onData(event) {
        const text = new TextDecoder().decode(event.target.value);
        const parts = text.trim().split(',');
        if (parts.length === 2) {
          pitch = parseFloat(parts[0]) - pitchOffset;
          roll  = parseFloat(parts[1]) - rollOffset;
          document.getElementById('angles').textContent =
            `Pitch: ${pitch.toFixed(1)}°   Roll: ${roll.toFixed(1)}°`;
          draw();
        }
      }

      function draw() {
        const canvas  = document.getElementById('level');
        const ctx     = canvas.getContext('2d');
        const cx      = canvas.width  / 2;
        const cy      = canvas.height / 2;
        const outerR  = 140;
        const targetR = 30;
        const bubbleR = 25;
        const maxAngle = 30;
        const maxDisplace = outerR - bubbleR - 4;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Outer housing fill
        ctx.beginPath();
        ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
        ctx.fillStyle = '#111122';
        ctx.fill();

        // --- Degree scale rings at 10° and 20° ---
        ctx.setLineDash([3, 4]);
        ctx.lineWidth = 1;
        [10, 20].forEach(deg => {
          const r = (deg / maxAngle) * maxDisplace;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.strokeStyle = '#2a2a50';
          ctx.stroke();
        });
        ctx.setLineDash([]);

        // Degree labels (right side of each ring)
        ctx.font = 'bold 11px Arial';
        ctx.textAlign = 'left';
        [10, 20].forEach(deg => {
          const r = (deg / maxAngle) * maxDisplace;
          ctx.fillStyle = '#445';
          ctx.fillText(`${deg}°`, cx + r + 3, cy + 4);
        });
        // Outer ring label
        ctx.fillStyle = '#445';
        ctx.fillText('30°', cx + outerR - 26, cy + 4);

        // Tick marks around outer ring (every 10°, at 4 cardinal points)
        ctx.lineWidth = 2;
        [0, 90, 180, 270].forEach(angleDeg => {
          const rad = (angleDeg - 90) * Math.PI / 180;
          ctx.beginPath();
          ctx.moveTo(cx + Math.cos(rad) * (outerR - 10), cy + Math.sin(rad) * (outerR - 10));
          ctx.lineTo(cx + Math.cos(rad) * outerR,        cy + Math.sin(rad) * outerR);
          ctx.strokeStyle = '#555';
          ctx.stroke();
        });

        // Outer housing ring
        ctx.beginPath();
        ctx.arc(cx, cy, outerR, 0, Math.PI * 2);
        ctx.strokeStyle = '#555';
        ctx.lineWidth = 3;
        ctx.stroke();

        // Crosshairs
        ctx.strokeStyle = '#252540';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(cx - outerR, cy); ctx.lineTo(cx + outerR, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, cy - outerR); ctx.lineTo(cx, cy + outerR); ctx.stroke();

        // Target ring (level zone)
        ctx.beginPath();
        ctx.arc(cx, cy, targetR, 0, Math.PI * 2);
        ctx.strokeStyle = '#0f3';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Bubble position — clamped inside outer ring
        let bx = cx + (roll  / maxAngle) * maxDisplace;
        let by = cy - (pitch / maxAngle) * maxDisplace;
        const dist = Math.sqrt((bx - cx) ** 2 + (by - cy) ** 2);
        if (dist > maxDisplace) {
          bx = cx + (bx - cx) * maxDisplace / dist;
          by = cy + (by - cy) * maxDisplace / dist;
        }

        // Bubble color: green when centred, red when tilted
        const levelRatio = Math.min(dist / (targetR - bubbleR / 2), 1);
        const r = Math.round(levelRatio * 220);
        const g = Math.round((1 - levelRatio) * 200 + 50);

        // Bubble with glare
        const grad = ctx.createRadialGradient(bx - 7, by - 7, 2, bx, by, bubbleR);
        grad.addColorStop(0,   'rgba(255,255,255,0.9)');
        grad.addColorStop(0.3, `rgb(${r},${g},40)`);
        grad.addColorStop(1,   'rgba(0,0,0,0.4)');
        ctx.beginPath();
        ctx.arc(bx, by, bubbleR, 0, Math.PI * 2);
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 1;
        ctx.stroke();
      }

      loadCalibration();
      draw();
    </script>
  </body>
  </html>
